<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            padding: 0;
            margin: 0;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .container {
            width: 600px;
            margin: 50px auto;
            border: 2px solid #333;
            padding: 5px;
            display: grid;
            grid-template-areas: 
            "header header"
            "aside main"
            "nav main"
            "footer footer";
            /* ukuran dari kolom */
            grid-template-columns: 1fr 1.6fr;
            /* ukuran dari tiap barisnya */
            grid-template-rows: 0.5fr 0.5fr 1.3fr;
        }

        header {
            grid-area: header;
            background-color: #B063D8;
            padding: 40px 0;
        }

        aside {
            grid-area: aside;
            background-color: #2F93FF;
            padding: 60px 0;
        }

        nav {
            grid-area: nav;
            background-color: #E45765;
            padding: 100px 0;
        }

        main {
            grid-area: main;
            background-color: #E0AA77;
            padding: 171.5px 0;
            flex: 1.6;
            justify-content: center;
            align-items: center;
        }

        footer {
            grid-area: footer;
            background-color: #666;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <aside>Aside</aside>
        <nav>Nav</nav>
        <main>Main</main>
        <footer>Footer</footer>
    </div>
</body>
</html>
