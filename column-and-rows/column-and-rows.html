<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid | Columns & Rows</title>

    <style>
        *{
            box-sizing: border-box;
        }

        body {
            background-color: #ddd;
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            display: grid;
            /* ada 3 kolom */
            grid-template-columns: 100px 25% 200px; 
            grid-template-rows: 100px 50px auto;
        }

        .item {
            background-color: rgb(138, 209, 254);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .item:nth-child(even) {
            background-color: rgb(255, 142, 142);
        }
    </style>
</head>
<!-- grid-template-columns & grid-template-rows mendefinisikan kolom/baris dengan cara menuliskan nilai dipisahkan oleh spasi. nilai mempresentasikan ukuran grid track dan spasi merepresentasikan grid line -->

<!-- penulisannya :  grid-template-columns: <track-size> ... | <line-name> <track-size>-->
<!-- <track-size> bisa berupa px, %, atau fr -->
<!-- <line-name> nama bebas -->
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">9</div>
    </div>
</body>
</html>
