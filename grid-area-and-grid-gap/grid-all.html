<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid | Grid (All Property)</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #ddd;
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        li {
            list-style: none;
            font-weight: bold;
        }

        .info {
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 50px auto;
            display: grid;
        }

        .item {
            width: 100%;
            background-color: rgb(138, 209, 254);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px;
        }

        .item:nth-child(even) {
            background-color: rgb(255, 142, 142);
        }
    </style>
</head>
<body>
    <div class="info">
        <h3>Grid All</h3>
        <p>dengan menggunakan grid, kita dapat melakukan shorthand untuk mendefinisikan seluruh property grid yang ada</p>
        <ul>
            <li>grid-template-rows</li>
            <li>grid-template-colums</li>
            <li>grid-template-areas</li>
            <li>grid-auto-rows</li>
            <li>grid-auto-colums</li>
            <li>grid-auto-flow</li>
        </ul>
    </div>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">9</div>
    </div>
</body>
</html>
