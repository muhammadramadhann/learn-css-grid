<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid | Grid Template Area</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #ddd;
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .info {
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            display: grid;
            grid-template-areas: 
            'header header header'
            'sidebar sidebar sidebar'
            'content content content'
            'footer footer footer';
        }

        .item {
            width: 100%;
            background-color: rgb(138, 209, 254);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px;
        }

        .header {
            background-color: lightblue;
            grid-area: header;
        }

        .sidebar {
            background-color: rgb(255, 200, 193);
            grid-area: sidebar;
        }

        .content {
            background-color: greenyellow;
            grid-area: content;
        }

        .footer {
            background-color: grey;
            grid-area: footer;
        }

        /* responsive breakpoint */
        @media screen and (min-width: 576px) {
            .container {
                grid-template-areas: 
                'header header header'
                'sidebar content content'
                'sidebar content content'
                'footer footer footer';
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h3>Grid Template Area</h3>
        <p>grid-template-area dapat digunakan untuk mendefinisikan grid template menggunakan nama dari area yang ditulis pada property grid-area pada item</p>
    </div>
    <div class="container">
        <div class="item header">header</div>
        <div class="item sidebar">sidebar</div>
        <div class="item content">content</div>
        <div class="item footer">footer</div>
        <!-- <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">9</div> -->
    </div>
</body>
</html>
