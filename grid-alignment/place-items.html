<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid | Place-Items</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #ddd;
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .info {
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            display: grid;
            grid-template-rows: 130px 130px 130px;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            place-items: center;
        }

        .item {
            height: 100px;
            background-color: rgb(138, 209, 254);
            border: 3px solid black;
        }

        .item:nth-child(even) {
            background-color: rgb(255, 142, 142);
        }
    </style>
</head>
<body>
    <div class="info">
        <h3>Place-Items</h3>
        <p>penulisannya, <strong>place-items: align-items justify-items</strong></p>
        <p>place-items merupakan shorthand untuk menulis justify-items dan align-items dalam satu deklarasi.</p>
    </div>
    <div class="container">
        <div class="item">Nasi goreng</div>
        <div class="item">Sate ayam</div>
        <div class="item">Martabak</div>
        <div class="item">Kebab</div>
        <div class="item">Nasi uduk</div>
        <div class="item">Pecel lele</div>
        <div class="item">Bubur ayam</div>
        <div class="item">Lontong sayur</div>
        <div class="item">Ketoprak</div>
    </div>
</body>
</html>
